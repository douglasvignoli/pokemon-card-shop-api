name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint · Typecheck · Tests
    runs-on: ubuntu-latest

    services:
      db_test:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pokemon_db_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (Ruff)
        run: ruff check .

      - name: Format check (Ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy main.py

      - name: Tests + Coverage
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5433/pokemon_db_test
        run: pytest --cov=main --cov-report=term-missing --cov-fail-under=85 -v
