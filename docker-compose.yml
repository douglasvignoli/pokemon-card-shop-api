version: "3.9"

services:

  # -------------------------------------------------------------------------
  # Banco de desenvolvimento — dados persistidos em volume nomeado.
  # -------------------------------------------------------------------------
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pokemon_db
    ports:
      - "5432:5432"
    volumes:
      - pokemon_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pokemon_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # Banco de testes — sem volume: dados descartados ao derrubar o container.
  # Porta separada (5433) evita conflito com o banco de desenvolvimento.
  # -------------------------------------------------------------------------
  db_test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pokemon_db_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pokemon_db_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # Adminer — interface web para inspecionar e gerenciar os bancos.
  # Aguarda db estar healthy antes de iniciar.
  # -------------------------------------------------------------------------
  adminer:
    image: adminer:4.8.1
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pokemon_data:
