[tool.ruff]
target-version = "py313"
line-length = 100

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "B008",  # FastAPI usa Depends() como argumento padrão — padrão do framework
    "N805",  # field_validator usa cls como primeiro argumento
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]  # assert é esperado em testes

[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
plugins = ["sqlalchemy.ext.mypy.plugin"]
